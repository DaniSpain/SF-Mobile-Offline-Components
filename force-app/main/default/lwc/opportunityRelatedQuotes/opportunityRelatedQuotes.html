<template>
    <lightning-card title="Related Quotes" icon-name="standard:quote">
        <template if:true={isLoading}>
            <div class="slds-p-around_medium slds-grid slds-grid_align-center">
                <lightning-spinner size="small" alternative-text="Loading"></lightning-spinner>
            </div>
        </template>

        <template if:true={offline}>
            <div class="slds-p-horizontal_medium slds-p-vertical_x-small offline-banner">
                <lightning-icon icon-name="utility:offline" size="xx-small" class="slds-m-right_x-small"></lightning-icon>
                <span>Offline</span>
            </div>
        </template>

        <template if:true={hasData}>
            <ul class="slds-p-around_small quote-list">
                <template for:each={quotes} for:item="q">
                        <li key={q.Id} class="quote-row" onclick={quoteClick} data-id={q.Id}>
                        <div class="row-main">
                            <div class="left">
                                <div class="name">
                                    <span class="qnum">{q.QuoteNumber.value}</span>
                                    <span class="qname slds-truncate" title={q.Name.value}>{q.Name.value}</span>
                                </div>
                                <div class="meta">
                                    <lightning-formatted-date-time value={q.CreatedDate.value} year="numeric" month="short" day="2-digit"></lightning-formatted-date-time>
                                    <span class="sep">•</span>
                                    <span class="status">{q.Status.value}</span>
                                </div>
                            </div>
                            <div class="right">
                                <lightning-formatted-number value={q.GrandTotal.value} format-style="currency"></lightning-formatted-number>
                                <lightning-icon icon-name="utility:chevronright" size="x-small" class="chevron"></lightning-icon>
                            </div>
                        </div>
                    </li>
                </template>
            </ul>

            <template if:true={hasMore}>
                <div class="slds-p-around_small slds-align_absolute-center">
                    <lightning-button variant="neutral" label="Load more" onclick={loadMore}></lightning-button>
                </div>
            </template>
        </template>

        <template if:true={showEmpty}>
            <div class="slds-p-around_medium slds-align_absolute-center slds-text-color_weak">
                No related Quotes found.
            </div>
        </template>

        <template if:true={error}>
            <c-error-panel errors={error}></c-error-panel>
        </template>
    </lightning-card>
</template>
