<template>
    <article class="slds-card slds-var-m-around_small">
        <div class="slds-card__header slds-grid">
            <header class="slds-media slds-media_center slds-has-flexi-truncate">
                <div class="slds-media__figure">
                    <span
                        class="slds-icon_container slds-icon-standard-file"
                        title="Files"
                    >
                        <lightning-icon
                            icon-name="standard:file"
                            alternative-text="Files"
                            title="Files"
                        ></lightning-icon>
                    </span>
                </div>
                <div class="slds-media__body">
                    <h2 class="slds-card__header-title slds-truncate">
                        <span>Files</span>
                    </h2>
                </div>
            </header>
        </div>

        <div class="slds-card__body slds-card__body_inner">
            <template if:true={files}>
                <ul class="slds-has-dividers_around-space">
                    <template for:each={files} for:item="file">
                        <li
                            key={file.id}
                            class="slds-item file-row"
                            data-id={file.id}
                            onclick={handleFileClick}
                        >
                            <article class="slds-tile slds-media">
                                <div class="slds-media__figure">
                                    <lightning-icon
                                        icon-name="doctype:attachment"
                                        alternative-text="File"
                                        title="File"
                                    ></lightning-icon>
                                </div>

                                <div class="slds-media__body">
                                    <h3 class="slds-truncate" title={file.title}>
                                        {file.title}
                                    </h3>

                                    <!-- Se è un’immagine, mostriamo la preview usando VersionDataUrl -->
                                    <template if:true={file.isImage}>
                                        <div class="image-wrapper">
                                            <img
                                                src={file.imageUrl}
                                                alt={file.title}
                                                class="image-preview"
                                            />
                                        </div>
                                    </template>

                                    <div class="slds-text-body_small slds-text-color_weak">
                                        <template if:true={file.extension}>
                                            <span>{file.extension}</span>
                                        </template>
                                    </div>
                                </div>
                            </article>
                        </li>
                    </template>
                </ul>
            </template>

            <template if:false={files}>
                <p class="slds-text-body_small slds-text-color_weak">
                    Nessun file associato a questo record.
                </p>
            </template>
        </div>
    </article>
</template>
